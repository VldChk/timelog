name: Release (PyPI)

on:
  push:
    tags:
      - "v*"

jobs:
  verify-tag-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches pyproject version
        shell: bash
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          if not tag.startswith("v"):
              raise SystemExit(f"Expected tag prefixed with 'v', got: {tag}")

          project_version = tomllib.loads(
              Path("pyproject.toml").read_text(encoding="utf-8")
          )["project"]["version"]

          if tag[1:] != project_version:
              raise SystemExit(
                  f"Tag/version mismatch: tag={tag}, pyproject={project_version}"
              )
          print(f"Tag/version verified: {tag}")
          PY

  build-sdist:
    needs: verify-tag-version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install sdist build tools
        run: python -m pip install --upgrade pip build

      - name: Build sdist
        run: python -m build --sdist --outdir dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels:
    needs: verify-tag-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup QEMU (Linux cross-arch wheels)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install wheel build tools
        run: python -m pip install --upgrade pip cibuildwheel

      - name: Build wheels
        env:
          CIBW_CONFIG_SETTINGS: >-
            cmake.define.TIMELOG_BUILD_PYTHON=true
            cmake.define.TIMELOG_BUILD_PY_TESTS=false
            cmake.define.TIMELOG_BUILD_PY_FACADE_TESTS=false
            cmake.define.TIMELOG_STAGE_PYTHON_MODULE=false
            cmake.define.TIMELOG_STRICT_WARNINGS=false
            cmake.define.TIMELOG_BUILD_CORE_TESTS=false
            cmake.define.TIMELOG_BUILD_DEMOS=false
            cmake.define.TIMELOG_BUILD_SHARED=false
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish-pypi:
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi

    steps:
      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Verify artifacts
        run: |
          python -m pip install --upgrade pip twine
          python -m twine check dist/*

      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
