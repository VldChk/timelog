name: Coverage

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip -r requirements-test.txt

      - name: Configure
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          -DTIMELOG_BUILD_PYTHON=ON
          -DTIMELOG_BUILD_PY_TESTS=ON
          -DTIMELOG_BUILD_PY_FACADE_TESTS=OFF

      - name: Build e2e targets
        run: cmake --build build --target timelog_e2e_build --config Release -j 2

      - name: Run Python facade and demo tests with coverage
        shell: bash
        run: |
          set +e
          cmake -E env "PYTHONPATH=${GITHUB_WORKSPACE}/python" \
            python -m pytest python/tests demo/tests \
              --cov=timelog \
              --cov-report=xml:coverage.xml \
              --cov-report=term-missing \
              -q \
            2>&1 | tee "${RUNNER_TEMP}/coverage-pytest.log"
          exit_code=${PIPESTATUS[0]}
          exit $exit_code

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts
          path: |
            coverage.xml
            ${{ runner.temp }}/coverage-pytest.log

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: coverage.xml
          flags: python-facade
          fail_ci_if_error: true
