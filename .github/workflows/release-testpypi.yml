name: Release (TestPyPI)

on:
  workflow_dispatch:

jobs:
  build-sdist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install sdist build tools
        run: python -m pip install --upgrade pip build

      - name: Build sdist
        run: python -m build --sdist --outdir dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install wheel build tools
        run: python -m pip install --upgrade pip cibuildwheel

      - name: Build wheels
        env:
          CIBW_CONFIG_SETTINGS: >-
            cmake.define.TIMELOG_BUILD_PYTHON=true
            cmake.define.TIMELOG_BUILD_PY_TESTS=false
            cmake.define.TIMELOG_BUILD_PY_FACADE_TESTS=false
            cmake.define.TIMELOG_STAGE_PYTHON_MODULE=false
            cmake.define.TIMELOG_STRICT_WARNINGS=false
            cmake.define.TIMELOG_BUILD_CORE_TESTS=false
            cmake.define.TIMELOG_BUILD_DEMOS=false
            cmake.define.TIMELOG_BUILD_SHARED=false
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish-testpypi:
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: testpypi

    steps:
      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Verify artifacts
        run: |
          python -m pip install --upgrade pip twine
          python -m twine check dist/*

      - name: Publish to TestPyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
